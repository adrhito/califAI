  - paragraph [ref=e183]: "In plain English:"
  - list [ref=e184]:
    - listitem [ref=e185]: Calify only sees what you explicitly capture
    - listitem [ref=e186]: Screenshots are processed and immediately deleted
    - listitem [ref=e187]: Your API key and preferences stay on your device
    - listitem [ref=e188]: No tracking, analytics, or data collection
    - listitem [ref=e189]: You control your Google Calendar access
