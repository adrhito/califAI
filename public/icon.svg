<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#FFDFB0"/>

  <!-- Calendar body with rounded corners -->
  <rect x="24" y="34" width="80" height="72" rx="12" fill="#7D2E3D"/>

  <!-- Left binding ring -->
  <rect x="42" y="18" width="12" height="28" rx="6" fill="#7D2E3D"/>

  <!-- Right binding ring -->
  <rect x="74" y="18" width="12" height="28" rx="6" fill="#7D2E3D"/>

  <!-- Inner white/light area -->
  <rect x="30" y="50" width="68" height="50" rx="8" fill="#FFDFB0"/>

  <!-- Date grid - 2 rows of 3 squares -->
  <rect x="40" y="60" width="12" height="12" fill="#7D2E3D"/>
  <rect x="58" y="60" width="12" height="12" fill="#7D2E3D"/>
  <rect x="76" y="60" width="12" height="12" fill="#7D2E3D"/>

  <rect x="40" y="80" width="12" height="12" fill="#7D2E3D"/>
  <rect x="58" y="80" width="12" height="12" fill="#7D2E3D"/>
  <rect x="76" y="80" width="12" height="12" fill="#7D2E3D"/>
</svg>
